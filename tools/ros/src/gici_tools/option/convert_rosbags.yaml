  formators:
  - formator:
      io: input
      tag: fmt_gnss_rov
      type: gnss-rinex
  - formator:
      io: input
      tag: fmt_gnss_ref
      type: gnss-rinex
  - formator:
      io: input
      tag: fmt_gnss_eph_G
      type: gnss-rinex
  - formator:
      io: input
      tag: fmt_gnss_eph_R
      type: gnss-rinex
  - formator:
      io: input
      tag: fmt_gnss_eph_E
      type: gnss-rinex
  - formator:
      io: input
      tag: fmt_gnss_eph_C
      type: gnss-rinex

rosbags:
- rosbag: 
    tag: rosbag_gnss_rov
    type: rosbag
    input_tags: [fmt_gnss_rov]
    path: /media/cc/T7/ubuntu/datasets/urbannav/harshurban/gnss_rover.bag
    topic_name: /gici/gnss_rover
    format: gnss_raw
    enable_observation: true
- rosbag: 
    tag: rosbag_gnss_ref
    type: rosbag
    input_tags: [fmt_gnss_ref]
    path: /media/cc/T7/ubuntu/datasets/urbannav/harshurban/gnss_reference.bag
    topic_name: /gici/gnss_reference
    format: gnss_raw
    enable_observation: true
    enable_antenna_position: true
- rosbag: 
    tag: rosbag_gnss_eph_G
    type: rosbag
