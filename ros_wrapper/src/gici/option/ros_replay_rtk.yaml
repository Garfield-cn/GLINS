- estimator:
    tag: est_rtk
    type: rtk
    input_tags: [fmt_gnss, fmt_gnss_eph, fmt_gnss_ref, fmt_dcb_file]
    fmt_gnss_roles: [rover]
    fmt_gnss_eph_roles: [ephemeris]
    fmt_gnss_ref_roles: [reference]
    fmt_dcb_file_roles: [code_bias]
    output_tags: [str_solution, str_solution_odometry, str_solution_path]
    loop_duration: 0  
    output_align_tag: fmt_gnss
    compute_covariance: true
    rtk_options:
      max_window_length: 3
      use_ambiguity_resolution: true
      estimate_velocity: true
    gnss_estimator_base_options:
      use_outlier_rejection: true
      reject_one_outlier_once: false
    estimator_base_options:
      max_iteration: 10
      num_threads: 2
      max_solver_time: 0.05
      verbose_output: true
      solver_type: dense_schur
      trust_region_strategy_type: dogleg
    ambiguity_resolution_options:
      system_exclude: [R]
      min_percentage_fixation_nl: 0.8
      ratio: 2.0
      min_consistant_fix_as_stable: 5

logging:
  enable: true
  min_log_level: 0
  file_directory: /home/cc/datasets/log
  log_to_stderr: true
