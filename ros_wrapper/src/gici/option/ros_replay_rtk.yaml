# Gici board configurations
stream:
  streamers:
  - streamer:
      tag: str_gnss_rov_file
      output_tags: [fmt_gnss_rov]
      type: file
      path: /media/cc/T72/ubuntu/datasets/gici/20230301_campus/20230301_2/gnss_rover.bin
  - streamer:
      tag: str_gnss_ref
      output_tags: [fmt_gnss_ref]
      type: file
      path: /media/cc/T72/ubuntu/datasets/gici/20230301_campus/20230301_2/gnss_reference.bin
  - streamer:
      tag: str_dcb_file
      output_tags: [fmt_dcb_file]
      type: file
      path: /home/cc/linux/softwares/gici/option/CAS0MGXRAP_20221580000_01D_01D_DCB.BSX
      enable_time_tag: false
  - streamer:
      tag: str_solution_file
      input_tags: [fmt_solution_file]
      type: file
      path: /media/cc/T72/ubuntu/datasets/gici/20230301_campus/20230301_2/solution.txt
      enable_time_tag: false
  - streamer:
      tag: str_solution
      type: ros
      topic_name: solution
      queue_size: 5
      io: output
      format: pose_stamped
  - streamer:
      tag: str_solution_odometry
      type: ros
      topic_name: solution_odometry
      queue_size: 10
      io: output
      format: odometry
      subframe_id: Body
  - streamer:
      tag: str_solution_path
      type: ros
      topic_name: solution_path
      queue_size: 100
      io: output
      format: path

  formators:
  - formator:
      io: input
      tag: fmt_gnss_rov
      type: gnss-raw
      sub_type: tersus
      start_time: 2023.03.01.08
  - formator:
      io: input
      tag: fmt_gnss_ref
      type: gnss-rtcm-3
      start_time: 2023.03.01.08
  - formator:
      io: input
      tag: fmt_dcb_file
      type: dcb-file
  - formator:
      io: output
      tag: fmt_solution_file
      type: nmea 
      use_esa: true
      talker_id: GP

  replay:
    enable: true
    speed: 3.0
    start_offset: 0.0

estimate:
- estimator:
    tag: est_gnss
    type: rtk
    input_tags: [fmt_gnss_rov, fmt_gnss_ref, fmt_dcb_file]
    fmt_gnss_rov_roles: [rover]
    fmt_gnss_ref_roles: [reference, ephemeris]
    fmt_dcb_file_roles: [code_bias]
    output_tags: [str_solution, str_solution_odometry, str_solution_path, fmt_solution_file]
    output_align_tag: fmt_gnss_rov
    compute_covariance: true
    rtk_options:
      max_window_length: 3
      use_ambiguity_resolution: true
      estimate_velocity: true
    gnss_estimator_base_options:
      gnss_common:
        system_exclude: [R, E, C]
        code_exclude: [G|5Q]
        min_elevation: 7.0
        min_SNR: [35.0, 30.0]
      use_outlier_rejection: true
      max_pesudorange_norm_error: 3.0
      max_phaserange_norm_error: 3.0
    estimator_base_options:
      max_iteration: 10
      num_threads: 2
      max_solver_time: 0.05
      verbose_output: true
      solver_type: dense_schur
      trust_region_strategy_type: dogleg
    ambiguity_resolution_options:
      system_exclude: [R]
      min_percentage_fixation_uwl: 1.0
      min_percentage_fixation_wl: 0.9
      min_percentage_fixation_nl: 0.9
      ratio: 2.0

logging:
  enable: true
  min_log_level: 0
  log_to_stderr: true
  file_directory: /home/cc/datasets/log
