# Gici board configurations
stream:
  streamers:
  - streamer:
      tag: str_gnss
      output_tags: [fmt_gnss, fmt_gnss_eph]
      type: file
      path: /media/cc/T72/ubuntu/datasets/gici_board/raw/store/20221123_rtk/rover.bin
  - streamer:
      tag: str_gnss_ref
      output_tags: [fmt_gnss_ref]
      type: file
      path: /media/cc/T72/ubuntu/datasets/gici_board/raw/store/20221123_rtk/reference.bin
  - streamer:
      tag: str_dcb_file
      output_tags: [fmt_dcb_file]
      type: file
      path: /home/cc/linux/softwares/gici/option/CAS0MGXRAP_20221580000_01D_01D_DCB.BSX
      enable_time_tag: false
  - streamer:
      tag: str_solution
      type: ros
      topic_name: solution
      queue_size: 5
      io: output
      format: pose_stamped
  - streamer:
      tag: str_solution_odometry
      type: ros
      topic_name: solution_odometry
      queue_size: 10
      io: output
      format: odometry
      subframe_id: Body
  - streamer:
      tag: str_solution_path
      type: ros
      topic_name: solution_path
      queue_size: 100
      io: output
      format: path

  formators:
  - formator:
      io: input
      tag: fmt_gnss
      type: gnss-raw
      sub_type: tersus
      start_time: 2022.11.23.09
  - formator:
      io: input
      tag: fmt_gnss_eph
      type: gnss-rtcm-3
      start_time: 2022.11.23.09
  - formator:
      io: input
      tag: fmt_gnss_ref
      type: gnss-rtcm-3
      start_time: 2022.11.23.09
  - formator:
      io: input
      tag: fmt_dcb_file
      type: dcb-file

  replay:
    enable: true
    speed: 5.0
    start_offset: 0.0

