# Gici board configurations
stream:
  streamers:
  - streamer:
      tag: str_ros_gnss_rov
      type: ros
      topic_name: gnss_rover
      queue_size: 3
      io: input
      format: gnss_raw
      enable_observation: true
  - streamer:
      tag: str_ros_gnss_ref
      type: ros
      topic_name: gnss_reference
      queue_size: 3
      io: input
      format: gnss_raw
      enable_observation: true
      enable_ephemeris: true
      enable_antenna_position: true
      enable_ionosphere_parameter: true
  - streamer:
      tag: str_dcb_file
      output_tags: [fmt_dcb_file]
      type: file
      path: /home/cc/linux/softwares/gici/option/CAS0MGXRAP_20221580000_01D_01D_DCB.BSX
      enable_time_tag: false
  - streamer:
      tag: str_solution
      type: ros
      topic_name: solution
      queue_size: 5
      io: output
      format: pose_stamped
  - streamer:
      tag: str_solution_odometry
      type: ros
      topic_name: solution_odometry
      queue_size: 10
      io: output
      format: odometry
      subframe_id: Body
  - streamer:
      tag: str_solution_path
      type: ros
      topic_name: solution_path
      queue_size: 100
      io: output
      format: path

  formators:
  - formator:
      io: input
      tag: fmt_dcb_file
      type: dcb-file

  replay:
    enable: false

estimate:
- estimator:
    tag: est_rtk
    type: rtk
    input_tags: [str_ros_gnss_rov, str_ros_gnss_ref, fmt_dcb_file]
    str_ros_gnss_rov_roles: [rover]
    str_ros_gnss_ref_roles: [reference, ephemeris]
    fmt_dcb_file_roles: [code_bias]
    output_tags: [str_solution, str_solution_odometry, str_solution_path]
    loop_duration: 0  
    output_align_tag: str_ros_gnss_rov
    compute_covariance: true
    rtk_options:
      max_window_length: 3
      use_ambiguity_resolution: true
      estimate_velocity: true
    gnss_estimator_base_options:
      use_outlier_rejection: true
      gnss_common:
        # system_exclude: [R, E, C]
    estimator_base_options:
      max_iteration: 10
      num_threads: 2
      max_solver_time: 0.05
      verbose_output: true
      solver_type: dense_schur
      trust_region_strategy_type: dogleg
    ambiguity_resolution_options:
      system_exclude: [R, C]
      min_percentage_fixation_nl: 0.9
      ratio: 2.0

logging:
  enable: true
  min_log_level: 0
  log_to_stderr: true
  file_directory: /home/cc/datasets/log
