# Gici board configurations
stream:
  streamers:
  - streamer:
      tag: str_ros_gnss
      type: ros
      topic_name: /gnss0
      io: input
      format: navsatfix
  - streamer:
      tag: str_ros_imu
      type: ros
      topic_name: /imu0
      io: input
      format: imu  
  - streamer:
      tag: str_ros_camera
      type: ros
      topic_name: /cam0
      io: input
      format: image  
  - streamer:
      tag: str_solution_file
      input_tags: [fmt_solution_file]
      type: file
      path: /media/cc/T72/ubuntu/datasets/kaist/urban38/gici/solution.txt
      enable_time_tag: false
  - streamer:
      tag: str_solution
      type: ros
      topic_name: solution
      queue_size: 5
      io: output
      format: pose_stamped
  - streamer:
      tag: str_solution_odometry
      type: ros
      topic_name: solution_odometry
      queue_size: 10
      io: output
      format: odometry
      subframe_id: Body
  - streamer:
      tag: str_solution_path
      type: ros
      topic_name: solution_path
      queue_size: 100
      io: output
      format: path
  - streamer:
      tag: str_featured_image
      type: ros
      topic_name: featured_image
      queue_size: 3
      io: output
      format: image
  - streamer:
      tag: str_landmarks
      type: ros
      topic_name: landmarks
      queue_size: 3
      marker_scale: 0.2
      io: output
      format: marker

  formators:
  - formator:
      io: output
      tag: fmt_solution_file
      type: nmea 
      use_esa: true
      use_esd: true
      talker_id: GP

  replay:
    enable: false
    speed: 1.0
    start_offset: 0.0

