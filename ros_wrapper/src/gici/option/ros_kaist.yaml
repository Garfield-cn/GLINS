- estimator:
    tag: est_gnss_imu_camera_srr
    type: gnss_imu_camera_srr
    input_tags: [str_ros_imu, str_ros_gnss, str_ros_camera]
    str_ros_imu_roles: [major]
    str_ros_gnss_roles: [position]
    str_ros_camera_roles: [mono]
    output_tags: [str_solution, str_solution_odometry, str_solution_path, str_featured_image, str_landmarks, fmt_solution_file]
    output_align_tag: str_ros_camera
    # output_downsample_rate: 1
    compute_covariance: false
    enable_input_align: true
    input_align_latency: 0.2
    enable_backend_data_sparsify: true
    pending_num_threshold: 5
    gnss_imu_camera_srr_options:
      max_keyframes: 10
    gnss_loose_estimator_base_options:
    visual_estimator_base_options:
      feature_error_std: 1.0
      landmark_outlier_rejection_threshold: 2.0
    imu_estimator_base_options:
      imu_parameters:
        sigma_bg: 1.0e-3
        sigma_ba: 1.0e-2
        sigma_g_c: 2.53e-05
        sigma_a_c: 3.50e-2
        sigma_gw_c: 3.79e-7
        sigma_aw_c: 7.51e-5
      car_motion: true
      body_to_imu_rotation: [180.0, 0.0, 90.0]
      body_to_imu_rotation_std: 5.0
      car_motion_min_velocity: 3.0
      car_motion_max_anguler_velocity: 5.0
    estimator_base_options:
      max_iteration: 5
      num_threads: 4
      max_solver_time: 0.02
      verbose_output: true
      solver_type: dense_schur
      trust_region_strategy_type: dogleg
    gnss_imu_initializer_options:
      max_iteration: 30
      num_threads: 4
      max_solver_time: 0.5
      gnss_extrinsics: [0.07, 0, -0.23]
      gnss_extrinsics_initial_std: [0.0, 0.0, 0.0]
      time_window_length_slow_motion: 0.05
      time_window_length_dynamic_motion: 0.5
      min_acceleration: 0.5
    feature_handler_options:
      max_features_per_frame: 200
      max_n_kfs: 30
      kfselect_min_numkfs: 30
      kfselect_min_disparity: 30.0
      kfselect_min_dist_metric: 20.0
      kfselect_min_angle: 30.0
      kfselect_min_dt: 5.0
      detector:
        cell_size: 30
      initialization:
      camera_parameters:
        label: "gici-board"
        cameras:
        - camera:
            label: cam0
            image_width: 1280
            image_height: 560
            type: pinhole
            intrinsics:
              cols: 1
              rows: 4
              data: [8.1640221474060002e+02, 8.1738388562809996e+02, 6.0882658427579997e+02, 2.6668865652440002e+02]
            distortion:
              type: radial-tangential  
              parameters:
                cols: 1
                rows: 4
                data: [-5.0040485799999999e-02, 1.2001217170000000e-01, -6.2598060000000004e-04, -1.1825064000000000e-03]
          # Transform of camera in body (IMU) frame
          T_B_C:
            cols: 4
            rows: 4
            data: [-0.006805021062343,   -0.015321558148885, 0.999859460896496,  1.71239,
                  0.999976819037382,   -3.346269927543277e-04, 0.006800692071643,   -0.247401,
                  2.303827655479318e-04, 0.999882562044496,     0.015323480124151,    0.11589,
                                      0,                       0,                       0,                       1]

logging:
  enable: true
  min_log_level: 0
  log_to_stderr: true
  file_directory: /home/cc/datasets/log
