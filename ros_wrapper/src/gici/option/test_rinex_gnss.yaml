# Gici board configurations
stream:
  streamers:
  - streamer:
      tag: str_gnss_rov_file
      output_tags: [fmt_gnss_rov]
      type: file
      path: /media/cc/T7/ubuntu/datasets/urbannav/mediumurban/gnss/20210517.light-urban.tste.ublox.f9p.splitter.obs
  - streamer:
      tag: str_gnss_ref_file
      output_tags: [fmt_gnss_ref]
      type: file
      path: /media/cc/T7/ubuntu/datasets/urbannav/mediumurban/gnss/HKSC/HKSC00HKG_R_20211370200_01H_01S_MO.rnx
  - streamer:
      tag: str_gnss_eph_file_1
      output_tags: [fmt_gnss_eph_1]
      type: file
      path: /media/cc/T7/ubuntu/datasets/urbannav/mediumurban/gnss/HKSC/HKSC00HKG_R_20211370000_01D_GN.rnx
  - streamer:
      tag: str_gnss_eph_file_2
      output_tags: [fmt_gnss_eph_2]
      type: file
      path: /media/cc/T7/ubuntu/datasets/urbannav/mediumurban/gnss/HKSC/HKSC00HKG_R_20211370000_01D_RN.rnx
  - streamer:
      tag: str_gnss_eph_file_3
      output_tags: [fmt_gnss_eph_3]
      type: file
      path: /media/cc/T7/ubuntu/datasets/urbannav/mediumurban/gnss/HKSC/HKSC00HKG_R_20211370000_01D_EN.rnx
  - streamer:
      tag: str_gnss_eph_file_4
      output_tags: [fmt_gnss_eph_4]
      type: file
      path: /media/cc/T7/ubuntu/datasets/urbannav/mediumurban/gnss/HKSC/HKSC00HKG_R_20211370000_01D_CN.rnx
  - streamer:
      tag: str_solution_file
      input_tags: [fmt_solution_file]
      type: file
      path: /home/cc/Documents/Shared/tmp/solution_2.txt
      enable_time_tag: false

  formators:
  - formator:
      io: input
      tag: fmt_gnss_rov
      type: gnss-rinex
  - formator:
      io: input
      tag: fmt_gnss_ref
      type: gnss-rinex
  - formator:
      io: input
      tag: fmt_gnss_eph_1
      type: gnss-rinex
  - formator:
      io: input
      tag: fmt_gnss_eph_2
      type: gnss-rinex
  - formator:
      io: input
      tag: fmt_gnss_eph_3
      type: gnss-rinex
  - formator:
      io: input
      tag: fmt_gnss_eph_4
      type: gnss-rinex
  - formator:
      io: output
      tag: fmt_solution_file
      type: nmea 
      use_esa: true
      use_esd: true
      talker_id: GP

  replay:
    enable: true
    speed: 50.0
    start_offset: 0.0

estimate:
- estimator:
    tag: est_rtk
    type: rtk
    input_tags: [fmt_gnss_rov, fmt_gnss_ref, fmt_gnss_eph_1, fmt_gnss_eph_2, fmt_gnss_eph_3, fmt_gnss_eph_4]
    fmt_gnss_rov_roles: [rover]
    fmt_gnss_ref_roles: [reference]
    fmt_gnss_eph_1_roles: [ephemeris, ion_utc]
    fmt_gnss_eph_2_roles: [ephemeris]
    fmt_gnss_eph_3_roles: [ephemeris]
    fmt_gnss_eph_4_roles: [ephemeris]
    output_tags: [fmt_solution_file]
    output_align_tag: fmt_gnss_rov
    compute_covariance: true
    rtk_options:
      max_window_length: 10
      use_ambiguity_resolution: true
      estimate_velocity: true
    gnss_estimator_base_options:
      min_num_satellite_redundancy: 2
      use_outlier_rejection: true
      max_pesudorange_error: 30.0
      max_phaserange_error: 0.1
      max_doppler_error: 5.0
      gnss_error_parameter:
        code_to_phase_ratio: 1000.0
        doppler_error_factor: 0.2
        relative_velocity: [10.0, 10.0, 1.0]
        relative_frequency: 1.0
      gnss_common:
        min_elevation: 7.0
        min_SNR: [30.0, 25.0]
    estimator_base_options:
      max_iteration: 5
      num_threads: 2
      max_solver_time: 0.02
      verbose_output: true
      solver_type: dense_schur
      trust_region_strategy_type: dogleg
    ambiguity_resolution_options:
      system_exclude: [R]
      min_percentage_fixation_uwl: 1.0
      min_percentage_fixation_wl: 0.9
      min_percentage_fixation_nl: 0.9
      ratio: 2.0
