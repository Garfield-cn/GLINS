- estimator:
    tag: est_gnss_imu_camera_srr
    type: gnss_imu_camera_srr
    input_tags: [str_imu, str_image]
    str_imu_roles: [major]
    str_image_roles: [mono]
    input_output_downsample_rate: [1, 2]
    output_tags: [str_solution, str_solution_odometry, str_solution_path, str_featured_image, str_landmarks]
    loop_duration: 0
    output_align_tag: gnss
    compute_covariance: false
    gnss_imu_camera_srr:
      max_keyframes: 3
    gnss_loose_estimator_base_options:
    visual_estimator_base_options:
      feature_error_std: 1.0
      landmark_outlier_rejection_threshold: 3.0
    imu_estimator_base_options:
      imu_parameters:
        sigma_bg: 1.0e-3
        sigma_ba: 1.0e-2
        sigma_g_c: 9.0e-4
        sigma_a_c: 7.5e-3
        sigma_gw_c: 2.4e-5
        sigma_aw_c: 2.1e-4
    estimator_base_options:
      max_iteration: 5
      num_threads: 6
      max_solver_time: 0.03
      verbose_output: true
      solver_type: dense_qr
      trust_region_strategy_type: dogleg
    gnss_imu_camera_initializer_options:
      max_iteration: 30
      num_threads: 6
      max_solver_time: 0.5
      gnss_extrinsics: [0.01, 0.2, -0.05]
      gnss_extrinsics_initial_std: 0.0
      time_window_length_slow_motion: 0.05
      time_window_length_gnss_dynamic_motion: 3.0
      min_acceleration: 0.5
      min_keyframe_window_length: 5
    feature_handler_options:
      max_n_kfs: 100
      kfselect_min_disparity: 20
      kfselect_min_angle: 10
      kfselect_min_dist_metric: 5
      camera_parameters:
        label: "vi-sensor"
        cameras:
        - camera:
            label: cam1
            image_width: 752
            image_height: 480
            type: pinhole
            intrinsics:
              cols: 1
              rows: 4
              data: [470.2057531638139, 470.6258233077641, 378.7909740462579, 217.69105287172025]
            distortion:
              type: radial-tangential  
              parameters:
                cols: 1
                rows: 4
                data: [-0.06597811223735722, 0.8559479340704287, -0.0006445829733139821, 0.0015137487236065916]
          # Transform of camera in body (IMU) frame
          T_B_C:
            cols: 4
            rows: 4
            data: [   0.9999890386957376,  0.004327657908484096, -0.001787138887099433,    0.0759605461736106,
                     -0.004322777440316803,    0.9999869417854392,  0.002725775817271925,  0.003608167087557431,
                      0.001798911775528767, -0.002718020535549974,    0.9999946881262881,  0.001765429319119522,
                                         0,                     0,                     0,                     1]

logging:
  enable: true
  min_log_level: 0
  log_to_stderr: true
  file_directory: /home/cc/datasets/log
