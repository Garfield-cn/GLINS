# Gici board configurations
stream:
  streamers:
  - streamer:
      tag: str_gnss_rov_file
      output_tags: [fmt_gnss_rov]
      type: file
      path: /media/cc/T72/ubuntu/datasets/gici/20230320_campus/2/gnss_rover.bin
  - streamer:
      tag: str_gnss_ref
      output_tags: [fmt_gnss_ref]
      type: file
      path: /media/cc/T72/ubuntu/datasets/gici/20230320_campus/2/gnss_reference.bin
  - streamer:
      tag: str_gnss_eph
      output_tags: [fmt_gnss_eph]
      type: file
      path: /media/cc/T72/ubuntu/datasets/gici/20230320_campus/2/gnss_ephemeris.bin
  - streamer:
      tag: str_gnss_ssr
      output_tags: [fmt_gnss_ssr]
      type: file
      path: /media/cc/T72/ubuntu/datasets/gici/20230320_campus/2/gnss_ssr.bin
  - streamer:
      tag: str_gnss_atx
      output_tags: [fmt_gnss_atx]
      type: file
      path: /home/cc/datasets/gnss_common/igs14.atx
      enable_time_tag: false
  - streamer:
      tag: str_dcb_file
      output_tags: [fmt_dcb_file]
      type: file
      path: /home/cc/linux/softwares/gici/option/CAS0MGXRAP_20221580000_01D_01D_DCB.BSX
      enable_time_tag: false
  - streamer:
      tag: str_solution_file
      input_tags: [fmt_solution_file]
      type: file
      path: /media/cc/T72/ubuntu/datasets/gici/20230320_campus/2/solution.txt
      enable_time_tag: false
  - streamer:
      tag: str_solution
      type: ros
      topic_name: solution
      queue_size: 5
      io: output
      format: pose_stamped
  - streamer:
      tag: str_solution_odometry
      type: ros
      topic_name: solution_odometry
      queue_size: 10
      io: output
      format: odometry
      subframe_id: Body
  - streamer:
      tag: str_solution_path
      type: ros
      topic_name: solution_path
      queue_size: 100
      io: output
      format: path

  formators:
  - formator:
      io: input
      tag: fmt_gnss_rov
      type: gnss-raw
      sub_type: tersus
      start_time: 2023.03.20
  - formator:
      io: input
      tag: fmt_gnss_ref
      type: gnss-rtcm-3
      start_time: 2023.03.20
  - formator:
      io: input
      tag: fmt_gnss_eph
      type: gnss-rtcm-3
      start_time: 2023.03.20
  - formator:
      io: input
      tag: fmt_gnss_ssr
      type: gnss-rtcm-3
      start_time: 2023.03.20
  - formator:
      io: input
      tag: fmt_gnss_atx
      type: atx-file
  - formator:
      io: input
      tag: fmt_dcb_file
      type: dcb-file
  - formator:
      io: output
      tag: fmt_solution_file
      type: nmea 
      use_esa: true
      talker_id: GP

  replay:
    enable: true
    speed: 1.0
    start_offset: 0.0

estimate:
- estimator:
    tag: est_ppp
    type: ppp
    input_tags: [fmt_gnss_rov, fmt_gnss_eph, fmt_gnss_ssr, fmt_gnss_atx]
    fmt_gnss_rov_roles: [rover]
    fmt_gnss_eph_roles: [ephemeris]
    fmt_gnss_ssr_roles: [ssr_ephemeris, code_bias, phase_bias]
    fmt_gnss_atx_roles: [phase_center]
    output_tags: [str_solution, str_solution_odometry, str_solution_path, fmt_solution_file]
    output_align_tag: fmt_gnss_rov
    compute_covariance: false
    ppp_options:
      max_window_length: 3
      use_ambiguity_resolution: false
      estimate_velocity: true
    gnss_estimator_base_options:
      use_outlier_rejection: true
      max_pesudorange_error: 4.0
      max_phaserange_error: 0.03
      gnss_common:
        min_elevation: 12.0
        system_exclude: [R]
        # satellite_exclude: [E07, E27, E33]
        # code_exclude: [G|5Q]
        # mw_slip_thres: 3.0  
        # gf_slip_thres: 0.05
    estimator_base_options:
      max_iteration: 2
      num_threads: 2
      max_solver_time: 0.02
      verbose_output: true
      solver_type: dense_schur
      trust_region_strategy_type: dogleg
      log_intermediate_data: false
      log_intermediate_data_directory: /home/cc/datasets/log_estimator

logging:
  enable: true
  min_log_level: 0
  log_to_stderr: true
  file_directory: /home/cc/datasets/log
