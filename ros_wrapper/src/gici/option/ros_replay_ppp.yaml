# Gici board configurations
stream:
  streamers:
  - streamer:
      tag: str_gnss_rov_file
      output_tags: [fmt_gnss_rov]
      type: file
      path: data/gnss_rover.bin
  - streamer:
      tag: str_gnss_eph
      output_tags: [fmt_gnss_eph]
      type: file
      path: data/gnss_ephemeris.bin
  - streamer:
      tag: str_gnss_ssr
      output_tags: [fmt_gnss_ssr]
      type: file
      path: data/gnss_ssr.bin
  - streamer:
      tag: str_gnss_atx
      output_tags: [fmt_gnss_atx]
      type: file
      path: option/igs14.atx
      enable_time_tag: false
  - streamer:
      tag: str_dcb_file
      output_tags: [fmt_dcb_file]
      type: file
      path: option/CAS0MGXRAP_20221580000_01D_01D_DCB.BSX
      enable_time_tag: false
  - streamer:
      tag: str_solution_file
      input_tags: [fmt_solution_file]
      type: file
      path: data/solution.txt
      enable_time_tag: false
  - streamer:
      tag: str_solution
      type: ros
      topic_name: solution
      queue_size: 5
      io: output
      format: pose_stamped
  - streamer:
      tag: str_solution_odometry
      type: ros
      topic_name: solution_odometry
      queue_size: 10
      io: output
      format: odometry
      subframe_id: Body
  - streamer:
      tag: str_solution_path
      type: ros
      topic_name: solution_path
      queue_size: 100
      io: output
      format: path

  formators:
  - formator:
      io: input
      tag: fmt_gnss_rov
      type: gnss-raw
      sub_type: tersus
  - formator:
      io: input
      tag: fmt_gnss_eph
      type: gnss-rtcm-3
      start_time: 2023.05.21
  - formator:
      io: input
      tag: fmt_gnss_ssr
      type: gnss-rtcm-3
      start_time: 2023.05.21
  - formator:
      io: input
      tag: fmt_gnss_atx
      type: atx-file
  - formator:
      io: input
      tag: fmt_dcb_file
      type: dcb-file
  - formator:
      io: output
      tag: fmt_solution_file
      type: nmea 
      use_esa: true
      talker_id: GP

  replay:
    enable: true
    speed: 2.0
    start_offset: 0.0

estimate:
- estimator:
    tag: est_ppp
    type: ppp
    input_tags: [fmt_gnss_rov, fmt_gnss_eph, fmt_gnss_ssr, fmt_dcb_file, fmt_gnss_atx]
    fmt_gnss_rov_roles: [rover]
    fmt_gnss_eph_roles: [ephemeris]
    # fmt_gnss_ssr_roles: [ssr_ephemeris, code_bias]
    # fmt_dcb_file_roles: [option]
    fmt_gnss_ssr_roles: [ssr_ephemeris]  # 5.21 dataset
    fmt_dcb_file_roles: [code_bias] 
    fmt_gnss_atx_roles: [phase_center]
    output_tags: [str_solution, str_solution_odometry, str_solution_path, fmt_solution_file]
    output_align_tag: fmt_gnss_rov
    compute_covariance: false
    ppp_options:
      max_window_length: 3
      use_ambiguity_resolution: false
      estimate_velocity: true
    gnss_estimator_base_options:
      min_num_satellite_redundancy: 6
      use_outlier_rejection: true
      max_pesudorange_error: 4.0
      max_phaserange_error: 0.03
      gnss_error_parameter:
        code_to_phase_ratio: 100.0
      gnss_common:
        min_elevation: 12.0
        min_SNR: [30.0, 30.0]
        # system_exclude: [C]
        # code_exclude: [G|5Q, E|7Q, C|7I]
    estimator_base_options:
      max_iteration: 10
      num_threads: 2
      max_solver_time: 0.02
      verbose_output: true
      solver_type: dense_schur
      trust_region_strategy_type: dogleg
      log_intermediate_data: true
      log_intermediate_data_directory: log
