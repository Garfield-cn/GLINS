  - streamer:
      tag: str-ref
      type: file
      path: /home/cc/datasets/msf_board/raw/store/22.1.30 校园路测/ref.rtcm3
      enable_time_tag: true
      swap_interval: 0
      buffer_length: 32768
      loop_duration: 1e-2
      formator_tags: [gnss-ref]

  - streamer:
      tag: str-head
      type: file
      path: /home/cc/datasets/msf_board/raw/store/22.1.30 校园路测/head.rtcm3
      enable_time_tag: true
      swap_interval: 0
      buffer_length: 32768
      loop_duration: 1e-2
      formator_tags: [gnss-head]

  - streamer:
      tag: str-imu
      type: file
      path: /home/cc/datasets/msf_board/raw/store/22.1.30 校园路测/imu.bin
      enable_time_tag: true
      swap_interval: 0
      buffer_length: 32768
      loop_duration: 1e-3
      formator_tags: [imu]

  - streamer:
      tag: str-camera
      type: file
      path: /home/cc/datasets/msf_board/raw/store/22.1.30 校园路测/camera.bin
      enable_time_tag: true
      swap_interval: 0
      buffer_length: 361472  # 752 * 480 + 512
      loop_duration: 1e-2
      formator_tags: [camera]

  - streamer:
      tag: solution_tc
      type: ros
      formator_tag: solution_tc
      topic_name: solution_tc
      queue_size: 10
      io: output
      format: pose_stamped
      subframe_id: Body

  - streamer:
      tag: path_tc
      type: ros
      formator_tag: path_tc
      topic_name: path_tc
      queue_size: 100
      io: output
      format: path

  - streamer:
      tag: solution_gic_stc
      type: ros
      formator_tag: solution_gic_stc
      topic_name: solution_gic_stc
      queue_size: 10
      io: output
      format: pose_stamped

  - streamer:
      tag: path_gic_stc
      type: ros
      formator_tag: path_gic_stc
      topic_name: path_gic_stc
      queue_size: 100
      io: output
      format: path

  - streamer:
      tag: feature
      type: ros
      formator_tag: feature
      topic_name: featured_image
      queue_size: 10
      io: output
      format: image
      

  formators:
#   - formator:
#       io: input
#       tag: gnss-rov
#       type: gnss-rtcm-3
#       start_time: 1643508393
#       role: [rover, ephemeris]

  - formator:
      io: input
      tag: gnss-ref
      type: gnss-rtcm-3
      start_time: 1643508393
      role: [reference]

#   - formator:
#       io: input
#       tag: gnss-head
#       type: gnss-rtcm-3
#       start_time: 1643508393
#       role: [heading]

  - formator:
      io: input
      tag: gnss-head
      type: gnss-rtcm-3
      start_time: 1643508393
      role: [rover, ephemeris]

  - formator:
      io: input
      tag: imu
      type: imu-pack
      role: [major]

  - formator:
      io: input
      tag: camera
      width: 752
      height: 480
      type: image-pack
      role: [mono]

  replay:
    enable: true
    speed: 1.0
    start_offset: 5.0

estimate:
- estimator:
    tag: rtk-imu-tc
    type: rtk_imu_tc
    input_formator_tags: [gnss-head, gnss-ref, imu]
    input_estimator_tags: []
    output_formator_tags: [solution_tc, path_tc]
    loop_duration: 0 
    loop_duration_align_tag: imu

    window_length: 3
    max_iteration: 10
    verbose: false
    gnss_common:
      min_elevation: 7.0
      period: 1.0
    gnss_error_parameter:
      code_to_phase_ratio: 100.0
    ambiguity_resolution:
      min_percentage_fixation_nl: 0.8
    imu_parameters:
      sigma_g_c: 1.0e-4
      sigma_a_c: 2.0e-3
      sigma_gw_c: 2.1e-5
      sigma_aw_c: 8.4e-4
    initialize:
      verbose: true
      max_iteration: 30
      gnss_extrinsic: [0.1, -0.4, -0.4]
      gnss_extrinsic_initial_std: 0.1
      window_length_optimize: 20

- estimator:
    tag: gnss-imu-camera-stc
    type: gnss_imu_camera_stc
    input_formator_tags: [imu, camera]
    input_estimator_tags: [rtk]
    output_formator_tags: [solution_gic_stc, path_gic_stc, feature]
    loop_duration: 0 
    loop_duration_align_tag: imu

    max_features_per_frame: 120
    kfselect_numkfs_lower_thresh: 60

    detector:
      cell_size: 30

    camera_parameters:
      label: "gici-board"
      cameras:
      - camera:
          label: cam0
          image_width: 752
          image_height: 480
          type: pinhole
          intrinsics:
            cols: 1
            rows: 4
            data: [315.54083037273074, 315.1858821111163, 360.57955594734096, 251.26381960919133]
          distortion:
            type: radial-tangential  
            parameters:
              cols: 1
              rows: 4
              data: [-0.01288326670663061, -0.00021668779553504528, 0.0014331179307111846, -0.0006177362267997965]
          mask: /home/cc/linux/softwares/gici/ros_wrapper/src/gici/option/gici-mask.png
        # Transform of camera in body (IMU) frame
        T_B_C:
          cols: 4
          rows: 4
          data: [0.013438121069744902, 0.9999076815409128, 0.0020112925174484274,	-0.01081910899562114,
                -0.9999015949876712, 0.01344608596596547, -0.004000389144360785,	-0.023026013140956158,
                -0.004027063846691544, -0.0019573368825354385, 0.9999899757443084,-0.025079472391013467,
                0, 0, 0, 1]


logging:
  enable: true
  min_log_level: 0
  log_to_stderr: true
  file_directory: /home/cc/datasets/log
