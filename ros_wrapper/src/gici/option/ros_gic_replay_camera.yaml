      enable_time_tag: true
      swap_interval: 0
      buffer_length: 32768
      loop_duration: 1e-2
      formator_tags: [gnss-ref]

  - streamer:
      tag: str-head
      type: file
      path: /home/cc/datasets/msf_board/raw/store/22.1.30 校园路测/head.rtcm3
      enable_time_tag: true
      swap_interval: 0
      buffer_length: 32768
      loop_duration: 1e-2
      formator_tags: [gnss-head]

  - streamer:
      tag: str-imu
      type: file
      path: /home/cc/datasets/msf_board/raw/store/22.1.30 校园路测/imu.bin
      enable_time_tag: true
      swap_interval: 0
      buffer_length: 32768
      loop_duration: 1e-3
      formator_tags: [imu]

  - streamer:
      tag: str-camera
      type: file
      path: /home/cc/datasets/msf_board/raw/store/22.1.30 校园路测/camera.bin
      enable_time_tag: true
      swap_interval: 0
      buffer_length: 361472  # 752 * 480 + 512
      loop_duration: 1e-2
      formator_tags: [camera]

  - streamer:
      tag: solution_lc
      type: ros
      formator_tag: solution_lc
      topic_name: solution_lc
      queue_size: 10
      io: output
      format: pose_stamped
      subframe_id: Body

  - streamer:
      tag: path_lc
      type: ros
      formator_tag: path_lc
      topic_name: path_lc
      queue_size: 100
      io: output
      format: path

  - streamer:
      tag: solution_gic_stc
      type: ros
      formator_tag: solution_gic_stc
      topic_name: solution_gic_stc
      subframe_id: Body
      queue_size: 10
      io: output
      format: pose_stamped

  - streamer:
      tag: path_gic_stc
      type: ros
      formator_tag: path_gic_stc
      topic_name: path_gic_stc
      queue_size: 100
      io: output
      format: path

  - streamer:
      tag: feature
      type: ros
      formator_tag: feature
      topic_name: featured_image
      queue_size: 10
      io: output
      format: image

  - streamer:
      tag: map
      type: ros
      formator_tag: map
      topic_name: landmarks
      queue_size: 100
      io: output
      format: marker
      
  - streamer:
      tag: solution_rtk
      type: file
      path: /home/cc/datasets/tmp/solution_rtk.txt
      enable_time_tag: false
      swap_interval: 0
      buffer_length: 4096
      loop_duration: 1e-3
      formator_tags: [solution_rtk]


  formators:
#   - formator:
#       io: input
#       tag: gnss-rov
#       type: gnss-rtcm-3
#       start_time: 1643508393
#       role: [rover, ephemeris]

  - formator:
      io: input
      tag: gnss-ref
      type: gnss-rtcm-3
      start_time: 1643508393
      role: [reference]

#   - formator:
#       io: input
#       tag: gnss-head
#       type: gnss-rtcm-3
#       start_time: 1643508393
#       role: [heading]

  - formator:
      io: input
      tag: gnss-head
      type: gnss-rtcm-3
      start_time: 1643508393
      role: [rover, ephemeris]

  - formator:
      io: input
      tag: imu
      type: imu-pack
      role: [major]

  - formator:
      io: input
      tag: camera
      width: 752
      height: 480
      type: image-pack
      role: [mono]

  - formator:
      io: output
      tag: solution_rtk
      type: nmea
      talker_id: GP
      use_gga: true
      use_rmc: true
      use_esa: true

  replay:
    enable: true
    speed: 1.0
    start_offset: 5.0

estimate:
- estimator:
    tag: rtk
    type: rtk
    input_formator_tags: [gnss-head, gnss-ref]
    input_estimator_tags: []
    output_formator_tags: [solution_rtk]
    loop_duration: 0  # if set as 0, we align the process rate to the "loop_duration-align" stream
    loop_duration_align_tag: gnss-head
    role: position
    estimator_options:
      window_length: 3
      max_iteration: 10
      verbose: false
      use_ambiguity_resolution: true
      gnss_common:
        min_elevation: 7.0
        period: 1.0
      gnss_error_parameter:
        code_to_phase_ratio: 100.0
        phase_error_factor: [0.003, 0.003, 0]
        system_error_ratio: [1.0, 3.0, 1.0, 1.0]
      ambiguity_resolution:
        system_exclude: [R, C]
        min_percentage_fixation_nl: 0.8
        ratio: 2.0
        min_consistant_fix_as_stable: 5

