- estimator:
    tag: est_gnss_imu_camera_srr
    type: gnss_imu_camera_srr
    input_tags: [fmt_camera, fmt_imu, est_rtk]
    fmt_camera_roles: [mono]
    fmt_imu_roles: [major]
    est_rtk_roles: [position]
    output_tags: [str_solution, str_solution_odometry, str_solution_path, str_featured_image, str_landmarks]
    loop_duration: 0 
    output_align_tag: fmt_camera
    compute_covariance: false
    gnss_imu_camera_srr:
      max_keyframes: 5
    gnss_loose_estimator_base_options:
    visual_estimator_base_options:
      feature_error_std: 1.0
      landmark_outlier_rejection_threshold: 4.0
    imu_estimator_base_options:
      imu_parameters:
        sigma_bg: 1.0e-3
        sigma_ba: 1.0e-2
        sigma_g_c: 2.6700e-04
        sigma_a_c: 0.0112
        sigma_gw_c: 2.0881e-06
        sigma_aw_c: 2.7361e-04
    estimator_base_options:
      max_iteration: 5
      num_threads: 4
      max_solver_time: 0.02
      verbose_output: true
      solver_type: dense_schur
      trust_region_strategy_type: dogleg
    gnss_imu_camera_initializer_options:
      max_iteration: 30
      num_threads: 6
      max_solver_time: 0.5
      gnss_extrinsics: [0.0, -0.37, -0.43]
      gnss_extrinsics_initial_std: [0.0, 0.0, 0.0]
      time_window_length_slow_motion: 0.05
      time_window_length_gnss_dynamic_motion: 5.0
      min_acceleration: 0.3
      min_keyframe_window_length: 5
    feature_handler_options:
      max_features_per_frame: 120
      max_n_kfs: 30
      min_disparity_init_landmark: 15.0
      kfselect_min_numkfs: 30
      kfselect_min_disparity: 30.0
      kfselect_min_dist_metric: 3.0
      kfselect_min_angle: 10.0
      detector:
        cell_size: 30
      initialization:
        init_map_scale: 1000
      camera_parameters:
        label: "gici-board"
        cameras:
        - camera:
            label: cam0
            image_width: 752
            image_height: 480
            type: pinhole
            intrinsics:
              cols: 1
              rows: 4
              data: [315.54083037273074, 315.1858821111163, 360.57955594734096, 251.26381960919133]
            distortion:
              type: radial-tangential  
              parameters:
                cols: 1
                rows: 4
                data: [-0.01288326670663061, -0.00021668779553504528, 0.0014331179307111846, -0.0006177362267997965]
            mask: /home/cc/linux/softwares/gici/ros_wrapper/src/gici/option/gici-mask.png
          # Transform of camera in body (IMU) frame
          T_B_C:
            cols: 4
            rows: 4
            data: [0.00827345712871924, -0.999961292459325, 0.00299390885206964,  -0.023387232408056,
                  0.999952608445414, 0.00825794726467827, -0.00515627483607444,   0.012743048092898,
                  0.00513135170794084, 0.00303642718487501, 0.999982224511816,    0.017968806326901,
                                    0,                   0,                 0,                    1]


logging:
  enable: true
  min_log_level: 0
  file_directory: /home/cc/datasets/log
  log_to_stderr: false
