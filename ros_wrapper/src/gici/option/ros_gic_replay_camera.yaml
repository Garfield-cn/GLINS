# Gici board configurations
stream:
  streamers:
# 用这个数据记得改streamer的tag比特位！！！！！！！！
  - streamer:
      tag: str_gnss_ref
      output_tags: [fmt_gnss_ref]
      type: file
      path: /media/cc/T72/ubuntu/datasets/gici_board/raw/store/22.1.30 校园路测/ref.rtcm3
  - streamer:
      tag: str_gnss
      output_tags: [fmt_gnss]
      type: file
      path: /media/cc/T72/ubuntu/datasets/gici_board/raw/store/22.1.30 校园路测/head.rtcm3
  - streamer:
      tag: str_imu
      output_tags: [fmt_imu]
      type: file
      path: /media/cc/T72/ubuntu/datasets/gici_board/raw/store/22.1.30 校园路测/imu.bin
  - streamer:
      tag: str_camera
      output_tags: [fmt_camera]
      type: file
      path: /media/cc/T72/ubuntu/datasets/gici_board/raw/store/22.1.30 校园路测/camera.bin
      buffer_length: 361472  # 752 * 480 + 512
  - streamer:
      tag: str_dcb_file
      output_tags: [fmt_dcb_file]
      type: file
      path: /home/cc/linux/softwares/gici/option/CAS0MGXRAP_20221580000_01D_01D_DCB.BSX
      enable_time_tag: false
  - streamer:
      tag: str_solution
      type: ros
      topic_name: solution
      queue_size: 5
      io: output
      format: pose_stamped
  - streamer:
      tag: str_solution_odometry
      type: ros
      topic_name: solution_odometry
      queue_size: 10
      io: output
      format: odometry
      subframe_id: Body
  - streamer:
      tag: str_solution_path
      type: ros
      topic_name: solution_path
      queue_size: 100
      io: output
      format: path
  - streamer:
      tag: str_featured_image
      type: ros
      topic_name: featured_image
      queue_size: 3
      io: output
      format: image
  - streamer:
      tag: str_landmarks
      type: ros
      topic_name: landmarks
      queue_size: 3
      io: output
      format: marker

  formators:
  - formator:
      io: input
      tag: fmt_gnss_ref
      type: gnss-rtcm-3
      start_time: 2022.01.30.06
  - formator:
      io: input
      tag: fmt_gnss
      type: gnss-rtcm-3
      start_time: 2022.01.30.06
  - formator:
      io: input
      tag: fmt_dcb_file
      type: dcb-file
  - formator:
      io: input
      tag: fmt_imu
      type: imu-pack
  - formator:
      io: input
      tag: fmt_camera
      width: 752
      height: 480
      type: image-pack

  replay:
    enable: true
    speed: 1.0
    start_offset: 15.0

