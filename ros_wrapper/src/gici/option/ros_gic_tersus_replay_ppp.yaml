  formators:
  - formator:
      io: input
      tag: fmt_gnss_rov
      type: gnss-raw
      sub_type: tersus
  - formator:
      io: input
      tag: fmt_gnss_eph
      type: gnss-rtcm-3
      start_time: 2023.05.21
  - formator:
      io: input
      tag: fmt_gnss_ssr
      type: gnss-rtcm-3
      start_time: 2023.05.21
  - formator:
      io: input
      tag: fmt_gnss_atx
      type: atx-file
  - formator:
      io: input
      tag: fmt_dcb_file
      type: dcb-file
  - formator:
      io: input
      tag: fmt_imu
      type: imu-pack
  - formator:
      io: input
      tag: fmt_camera
      width: 752
      height: 480
      type: image-pack
  - formator:
      io: output
      tag: fmt_solution_file
      type: nmea 
      use_esa: true
      use_esd: true
      talker_id: GP
  - formator:
      io: output
      tag: fmt_solution_stream
      type: nmea 
      use_esa: true
      use_esd: true
      talker_id: GP

  replay:
    enable: true
    speed: 0.5
    start_offset: 0.0

