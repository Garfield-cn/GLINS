# Gici board configurations
stream:
  streamers:
  - streamer:
      tag: str_gnss_rov_file
      output_tags: [fmt_gnss_rov]
      type: file
      path: /home/cc/Work/gici_dataset_open/5.1/gnss_rover.bin
  - streamer:
      tag: str_gnss_eph
      output_tags: [fmt_gnss_eph]
      type: file
      path: /home/cc/Work/gici_dataset_open/5.1/gnss_ephemeris.bin
  - streamer:
      tag: str_gnss_ssr
      output_tags: [fmt_gnss_ssr]
      type: file
      path: /home/cc/Work/gici_dataset_open/5.1/gnss_ssr.bin
  - streamer:
      tag: str_gnss_atx
      output_tags: [fmt_gnss_atx]
      type: file
      path: /home/cc/Work/Codes/gici-open/option/igs14.atx
      enable_time_tag: false
  - streamer:
      tag: str_dcb_file
      output_tags: [fmt_dcb_file]
      type: file
      path: /home/cc/Work/gici_dataset_open/code_bias/5.21/CAS0MGXRAP_20231410000_01D_01D_DCB.BSX
      enable_time_tag: false
  - streamer:
      tag: str_imu
      output_tags: [fmt_imu]
      type: file
      path: /home/cc/Work/gici_dataset_open/5.1/imu.bin
      loop_duration: 0.001
  - streamer:
      tag: str_camera
      output_tags: [fmt_camera]
      type: file
      path: /home/cc/Work/gici_dataset_open/5.1/camera.bin
      buffer_length: 361472  # 752 * 480 + 512 
  - streamer:
      tag: str_solution_file
      input_tags: [fmt_solution_file]
      type: file
      path: /home/cc/Work/gici_dataset_open/5.1/solution.txt
      enable_time_tag: false
  - streamer:
      tag: str_solution_stream
      input_tags: [fmt_solution_stream]
      type: tcp-server
      port: 9001
  - streamer:
      tag: str_ros_imu
      input_tags: [fmt_imu]
      type: ros
      topic_name: imu_raw
      queue_size: 10
      io: log
      format: imu
  - streamer:
      tag: str_ros_camera
      input_tags: [fmt_camera]
      type: ros
      topic_name: image_raw
      queue_size: 10
      io: log
      format: image
  - streamer:
      tag: str_solution
      type: ros
      topic_name: solution
      queue_size: 5
      io: output
      format: pose_stamped
  - streamer:
      tag: str_solution_odometry
      type: ros
      topic_name: solution_odometry
      queue_size: 10
      io: output
      format: odometry
      subframe_id: Body
  - streamer:
      tag: str_solution_path
      type: ros
      topic_name: solution_path
      queue_size: 100
      io: output
      format: path
  # - streamer:
