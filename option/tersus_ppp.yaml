# GICI offline pseudo-real-time PPP estimation. 
stream:
  streamers:
  - streamer:
      tag: str_gnss_rov
      output_tags: [fmt_gnss_rov]
      type: tcp-client
      ip: 106.14.184.52
      port: 7788
  - streamer:
      tag: str_gnss_eph
      output_tags: [fmt_gnss_eph]
      type: ntrip-client
      ip: 112.65.161.226
      port: 2101
      username: chichengcn  
      passward: chi671003
      mountpoint: RTCM3EPH
  - streamer:
      tag: str_gnss_ssr
      output_tags: [fmt_gnss_ssr]
      type: ntrip-client
      ip: 112.65.161.226
      port: 2101
      username: chichengcn  
      passward: chi671003
      mountpoint: SSRA00CNE0
  - streamer:
      tag: str_gnss_atx
      output_tags: [fmt_gnss_atx]
      type: file
      path: /home/cc/Work/Codes/gici-open/option/igs14.atx
      enable_time_tag: false

  - streamer:
      tag: str_gnss_rov_file
      input_tags: [str_gnss_rov]
      type: file
      path: /home/cc/Work/Data/ppp/tersus_20240124/rover.bin
      enable_time_tag: true
  - streamer:
      tag: str_gnss_eph_file
      input_tags: [str_gnss_eph]
      type: file
      path: /home/cc/Work/Data/ppp/tersus_20240124/ephemeris.bin
      enable_time_tag: true
  - streamer:
      tag: str_gnss_ssr_file
      input_tags: [str_gnss_ssr]
      type: file
      path: /home/cc/Work/Data/ppp/tersus_20240124/ssr.bin
      enable_time_tag: true
  - streamer:
      tag: str_solution_file
      input_tags: [fmt_solution_file]
      type: file
      path: /home/cc/Work/Data/ppp/tersus_20240124/ppp_solution.txt
      enable_time_tag: false

  formators:
  - formator:
      io: input
      tag: fmt_gnss_rov
      type: gnss-rtcm-3
      start_time: 2024.01.24
  - formator:
      io: input
      tag: fmt_gnss_eph
      type: gnss-rtcm-3
      start_time: 2024.01.24
  - formator:
      io: input
      tag: fmt_gnss_ssr
      type: gnss-rtcm-3
      start_time: 2024.01.24
  - formator:
      io: input
      tag: fmt_gnss_atx
      type: atx-file
  - formator:
      io: output
      tag: fmt_solution_file
      type: nmea 
      use_esa: true
      talker_id: GP

  replay:
    enable: false
    speed: 1.0
    start_offset: 0.0

estimate:
- estimator:
    tag: est_ppp
    type: ppp
    input_tags: [fmt_gnss_rov, fmt_gnss_eph, fmt_gnss_ssr, fmt_gnss_atx]
    fmt_gnss_rov_roles: [rover]
    fmt_gnss_eph_roles: [ephemeris]
    fmt_gnss_ssr_roles: [ssr_ephemeris, code_bias]
    fmt_gnss_atx_roles: [phase_center]
    output_tags: [fmt_solution_file]
    output_align_tag: fmt_gnss_rov
    compute_covariance: false
    ppp_options:
      max_window_length: 3
      use_ambiguity_resolution: false
      estimate_velocity: true
    gnss_estimator_base_options:
      use_outlier_rejection: true
      reject_one_outlier_once: true
      max_pesudorange_error: 4.0
      max_phaserange_error: 0.03
      gnss_error_parameter:
        code_to_phase_ratio: 500.0
      gnss_common:
        min_num_satellite_redundancy: 0
        min_elevation: 12.0
        min_SNR: [30.0, 30.0]
        # system_exclude: [R]  
        # code_exclude: [G|5Q, E|7I, C|7I, C|5D]  # dual-frequency
    estimator_base_options:
      max_iteration: 5
      num_threads: 2
      max_solver_time: 0.02
      verbose_output: true
      solver_type: dense_schur
      trust_region_strategy_type: dogleg
      log_intermediate_data: true
      log_intermediate_data_directory: /home/cc/Work/Data/ppp/log

logging:
  enable: true
  min_log_level: 0
  log_to_stderr: true
  file_directory: /home/cc/Work/Data/Log
