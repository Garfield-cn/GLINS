      start_time: 1643508393
      role: [rover, ephemeris]

  - formator:
      io: input
      tag: imu
      type: imu-pack
      role: [major]

  - formator:
      io: input
      tag: camera
      width: 752
      height: 480
      type: image-pack
      role: [mono]

  - formator:
      io: output
      tag: solution_spp
      type: nmea
      talker_id: GP
      use_gga: true
      use_rmc: true
      use_esa: true

  - formator:
      io: output
      tag: solution_dgnss
      type: nmea
      talker_id: GP
      use_gga: true
      use_rmc: true
      use_esa: true

  - formator:
      io: output
      tag: solution_rtk
      type: nmea
      talker_id: GP
      use_gga: true
      use_rmc: true
      use_esa: true

  - formator:
      io: output
      tag: solution_lc
      type: nmea
      talker_id: GP
      use_gga: true
      use_rmc: true
      use_esa: true

  - formator:
      io: output
      tag: solution_tc
      type: nmea
      talker_id: GP
      use_gga: true
      use_rmc: true
      use_esa: false

  replay:
    enable: true
    speed: 20.0
    start_offset: 5.0

