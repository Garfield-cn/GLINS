# Gici board configurations
stream:
  streamers:
  - streamer:
      tag: str-rov
      type: file
      path: /home/cc/linux/softwares/SJTU_multisensor_processer/data/raw/store/22.1.30 校园路测/rov.rtcm3
      enable_time_tag: true
      swap_interval: 0
      buffer-length: 32768
      loop-duration: 1e-2
      formator-tags: [gnss-rov]
  - streamer:
      tag: str-ref
      type: file
      path: /home/cc/linux/softwares/SJTU_multisensor_processer/data/raw/store/22.1.30 校园路测/ref.rtcm3
      enable_time_tag: true
      swap_interval: 0
      buffer-length: 32768
      loop-duration: 1e-2
      formator-tags: [gnss-ref]
  - streamer:
      tag: str-head
      type: file
      path: /home/cc/linux/softwares/SJTU_multisensor_processer/data/raw/store/22.1.30 校园路测/head.rtcm3
      enable_time_tag: true
      swap_interval: 0
      buffer-length: 32768
      loop-duration: 1e-2
      formator-tags: [gnss-head]
  - streamer:
      tag: str-imu
      type: file
      path: /home/cc/linux/softwares/SJTU_multisensor_processer/data/raw/store/22.1.30 校园路测/imu.bin
      enable_time_tag: true
      swap_interval: 0
      buffer-length: 32768
      loop-duration: 1e-3
      formator-tags: [imu]
  - streamer:
      tag: str-camera
      type: file
      path: /home/cc/linux/softwares/SJTU_multisensor_processer/data/raw/store/22.1.30 校园路测/camera.bin
      enable_time_tag: true
      swap_interval: 0
      buffer-length: 361472  # 752 * 480 + 512
      loop-duration: 1e-2
      formator-tags: [camera]


  formators:
  - formator:
      io: input
      tag: gnss-rov
      type: gnss-rtcm-3
      role: [rover, ephemeris]
  - formator:
      io: input
      tag: gnss-ref
      type: gnss-rtcm-3
      role: [reference]
  - formator:
      io: input
      tag: gnss-head
      type: gnss-rtcm-3
      role: [heading]
  - formator:
      io: input
      tag: imu
      type: imu-pack
      role: [major]
  - formator:
      io: input
      tag: camera
      width: 752
      height: 480
      type: image-pack
      role: [mono]

  replay:
    enable: true
    speed: 1.0
    start-offset: 0.0