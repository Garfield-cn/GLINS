# Gici board configurations
stream:
  streamers:
# 用这个数据记得改streamer的tag比特位！！！！！！！！
  - streamer:
      tag: str_ref
      output_tags: [fmt_gnss_ref]
      type: file
      path: /home/cc/datasets/msf_board/raw/store/22.1.30 校园路测/ref.rtcm3
      enable_time_tag: true
      swap_interval: 0
      buffer_length: 32768
      loop_duration: 1e-2
  - streamer:
      tag: str_head
      output_tags: [fmt_gnss_head]
      type: file
      path: /home/cc/datasets/msf_board/raw/store/22.1.30 校园路测/head.rtcm3
      enable_time_tag: true
      swap_interval: 0
      buffer_length: 32768
      loop_duration: 1e-2
  - streamer:
      tag: str_imu
      output_tags: [fmt_imu]
      type: file
      path: /home/cc/datasets/msf_board/raw/store/22.1.30 校园路测/imu.bin
      enable_time_tag: true
      swap_interval: 0
      buffer_length: 32768
      loop_duration: 1e-3
  - streamer:
      tag: str_dcb_file
      output_tags: [fmt_dcb_file]
      type: file
      path: /home/cc/linux/softwares/gici/option/CAS0MGXRAP_20221580000_01D_01D_DCB.BSX
      enable_time_tag: false
  - streamer:
      tag: str_solution_gnss
      input_tags: [fmt_solution_gnss]
      type: file
      path: /home/cc/datasets/tmp/solution_gnss.txt
      enable_time_tag: false
      swap_interval: 0
      buffer_length: 4096
      loop_duration: 1e-3
  - streamer:
      tag: str_solution_couple
      input_tags: [fmt_solution_couple]
      type: file
      path: /home/cc/datasets/tmp/solution_couple.txt
      enable_time_tag: false
      swap_interval: 0
      buffer_length: 4096
      loop_duration: 1e-3
      formator_tags: [fmt_solution_couple]

  - streamer:
      tag: str_ref_log
      input_tags: [fmt_ref_log]
      type: file
      path: /home/cc/datasets/msf_board/raw/store/22.1.30 校园路测/ref_log.rtcm3
      enable_time_tag: false


  formators:
  - formator:
      io: input
      tag: fmt_gnss_ref
      type: gnss-rtcm-3
      start_time: 2022.01.30.06
  - formator:
      io: input
      tag: fmt_gnss_head
      type: gnss-rtcm-3
      start_time: 2022.01.30.06
  - formator:
      io: input
      tag: fmt_imu
      type: imu-pack
  - formator:
      io: input
      tag: fmt_dcb_file
      type: dcb-file
  - formator:
      io: output
      tag: fmt_solution_gnss
      type: nmea
      talker_id: GP
      use_gga: true
      use_rmc: true
      use_esa: false
  - formator:
      io: output
      tag: fmt_solution_couple
      type: nmea
      talker_id: GP
      use_gga: true
      use_rmc: true
      use_esa: false

  - formator:
      io: log
      tag: fmt_ref_log
      input_tags: [fmt_gnss_ref]
      type: gnss-rtcm-3

  replay:
    enable: true
    speed: 1.0
    start_offset: 0.0

estimate:
- estimator:
    tag: est_spp
    type: spp
    input_tags: [fmt_gnss_head, fmt_dcb_file]
    fmt_gnss_head_roles: [rover, ephemeris]
    fmt_dcb_file_roles: [code_bias]
    output_tags: [fmt_solution_gnss]
    loop_duration: 0  # if set as 0, we align the process rate to the "loop_duration-align" stream
    output_align_tag: fmt_gnss_head
    compute_covariance: true
    estimator_base_options:
      max_iteration: 10
      num_threads: 2
      max_solver_time: 0.05
      verbose_output: true
      solver_type: dense_normal_cholesky
      trust_region_strategy_type: levenberg_marquardt
    gnss_estimator_base_options:
      gnss_common:
        min_elevation: 7.0
        max_gdop: 10.0
        system_exclude: [R, E, C]

