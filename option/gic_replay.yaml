- estimator:
    tag: rtk
    type: rtk
    input_formator_tags: [gnss-head, gnss-ref]
    input_estimator_tags: []
    output_formator_tags: [solution_rtk]
    loop_duration: 0  # if set as 0, we align the process rate to the "loop_duration-align" stream
    loop_duration_align_tag: gnss-head
    role: position

    window_length: 3
    max_iteration: 10
    verbose: false
    gnss_common:
      min_elevation: 7.0
      period: 1.0
    gnss_error_parameter:
      code_to_phase_ratio: 100.0
      phase_error_factor: [0.003, 0.003, 0]
      system_error_ratio: [1.0, 3.0, 1.0, 1.0]
    ambiguity_resolution:
      system_exclude: [R, C]
      min_percentage_fixation_nl: 0.8
      ratio: 2.0
      min_consistant_fix_as_stable: 5

