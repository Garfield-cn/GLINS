- estimator:
    tag: rtk
    type: rtk
    input_formator_tags: [gnss-brux0, gnss-brux0-ref]
    input_estimator_tags: []
    output_formator_tags: [solution_spp]
    loop_duration: 0  # if set as 0, we align the process rate to the "loop_duration-align" stream
    output_align_tag: gnss-brux0
    role: position
    compute_covariance: false
    estimator_base_options:
      max_iteration: 10
      num_threads: 2
      max_solver_time: 0.03
      verbose_output: true
      solver_type: dense_schur
      trust_region_strategy_type: dogleg
    gnss_estimator_base_options:
      use_outlier_rejection: true
      max_phaserange_norm_error: 4.0
      gnss_common:
        min_elevation: 7.0
        max_gdop: 10.0
        # system_exclude: [R, E, C]
        # code_exclude: [E|7Q, E|6C, E|8Q]
        # code_exclude: [G|2L, G|5Q]
      gnss_error_parameter:
        code_to_phase_ratio: 100
        phase_error_factor: [0.003, 0.003, 0.0]
        system_error_ratio: [1.0, 3.0, 1.0, 1.0]  # G, R, E, C 
        relative_position: [100.0, 100.0, 100.0]
        relative_ambiguity: 1.0e-4
    rtk_options:
      max_window_length: 2
      estimate_velocity: false
      use_ambiguity_resolution: true
    ambiguity_resolution_options:
      # system_exclude: [R, E, C]
      phase_exclude: [G|L2C]
      min_elevation: 12.0
      ratio: 3.0
      min_percentage_fixation_uwl: 1.0
      min_percentage_fixation_wl: 1.0
      min_percentage_fixation_nl: 0.8
      use_outlier_rejection: true
      max_phaserange_norm_error: 4.0
      min_consistant_fix_as_stable: 10
      fix_and_hold: true
    
logging:
  enable: true
  min_log_level: 0
  log_to_stderr: true
  file_directory: /home/cc/datasets/log


