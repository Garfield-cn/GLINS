      swap_interval: 0
      buffer_length: 4096
      loop_duration: 1e-3
      formator_tags: [solution_spp]

  formators:
  - formator:
      io: input
      tag: gnss-brux0
      type: gnss-rtcm-3
      start_time: 2022.07.14.14
      role: [rover]
  - formator:
      io: input
      tag: gnss-brux0-ref
      type: gnss-rtcm-3
      start_time: 2022.07.14.14
      role: [reference]
  - formator:
      io: input
      tag: gnss-dlr0
      type: gnss-rtcm-3
      start_time: 2022.07.14.14
      role: [ephemeris]
  - formator:
      io: input
      tag: dcb_file
      type: dcb-file
      role: [code_bias]
  - formator:
      io: output
      tag: solution_spp
      type: nmea
      talker_id: GP
      use_gga: true
      use_rmc: true
      use_esa: false

  replay:
    enable: true
    speed: 30.0
    start_offset: 1800.0

