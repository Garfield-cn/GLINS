      swap_interval: 0
      loop_duration: 0.01
      formator_tags: [gnss-brux0]
  - streamer:
      tag: str-dlr0
      type: file
      path: /home/cc/datasets/ntrip/20220714/dlr0.rtcm3
      enable_time_tag: true
      swap_interval: 0
      loop_duration: 0.01
      formator_tags: [gnss-dlr0]
  - streamer:
      tag: str-cas
      type: file
      path: /home/cc/datasets/ntrip/20220714/cas.rtcm3
      enable_time_tag: true
      swap_interval: 0
      loop_duration: 0.01
      formator_tags: [gnss-cas]
  - streamer:
      tag: str-cnes
      type: file
      path: /home/cc/datasets/ntrip/20220714/cnes.rtcm3
      enable_time_tag: true
      swap_interval: 0
      loop_duration: 0.01
      formator_tags: [gnss-cnes]
#   - streamer:
#       tag: dcb_file
#       type: file
#       path: /home/cc/linux/softwares/gici/option/CAS0MGXRAP_20221580000_01D_01D_DCB.BSX
#       enable_time_tag: false
#       formator_tags: [dcb_file]
  - streamer:
      tag: atx_file
      type: file
      path: /home/cc/linux/softwares/gici/option/igs14.atx
      enable_time_tag: false
      formator_tags: [atx_file]
  - streamer:
      tag: solution_spp
      type: file
      path: /home/cc/datasets/tmp/solution_spp.txt
      enable_time_tag: false
      swap_interval: 0
      buffer_length: 4096
      loop_duration: 1e-3
      formator_tags: [solution_spp]

  formators:
  - formator:
      io: input
      tag: gnss-brux0
      type: gnss-rtcm-3
      start_time: 2022.07.14.14
      role: [rover]
  - formator:
      io: input
      tag: gnss-dlr0
      type: gnss-rtcm-3
      start_time: 2022.07.14.14
      role: [ephemeris]
  - formator:
      io: input
      tag: gnss-cas
      type: gnss-rtcm-3
      start_time: 2022.07.14.14
      role: []
  - formator:
      io: input
      tag: gnss-cnes
      type: gnss-rtcm-3
      start_time: 2022.07.14.14
      role: [ssr_ephemeris, code_bias, phase_bias]
  - formator:
      io: input
      tag: dcb_file
      type: dcb-file
      role: [code_bias]
  - formator:
      io: input
      tag: atx_file
      type: atx-file
      role: [phase_center]
  - formator:
      io: output
      tag: solution_spp
      type: nmea
      talker_id: GP
      use_gga: true
      use_rmc: true
      use_esa: false

  replay:
    enable: true
    speed: 10.0
    start_offset: 21600.0

