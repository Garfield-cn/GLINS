# Gici board configurations
stream:
  streamers:
  - streamer:
      tag: str-log-brux0
      type: file
      path: /home/cc/linux/softwares/gici/data/brux0.rtcm3
      enable_time_tag: true
      swap_interval: 0
      loop-duration: 0.01
      formator-tags: [gnss-brux0]
  - streamer:
      tag: str-log-bkg0
      type: file
      path: /home/cc/linux/softwares/gici/data/bkg0.rtcm3
      enable_time_tag: true
      swap_interval: 0
      loop-duration: 0.01
      formator-tags: [gnss-bkg0]
  - streamer:
      tag: str-log-ssr
      type: file
      path: /home/cc/linux/softwares/gici/data/ssr.rtcm3
      enable_time_tag: true
      swap_interval: 0
      loop-duration: 0.01
      formator-tags: [gnss-ssr]

  formators:
  - formator:
      io: input
      tag: gnss-brux0
      type: gnss-rtcm-3
      role: [rover]
  - formator:
      io: input
      tag: gnss-bkg0
      type: gnss-rtcm-3
      role: [ephemeris]
  - formator:
      io: input
      tag: gnss-ssr
      type: gnss-rtcm-3
      role: [correction]

  replay:
    enable: true
    speed: 1.0
    start-offset: 0.0