stream:
  streamers:
  - streamer:
      tag: str-brux0
      type: ntrip-client
      ip: 112.65.161.226
      port: 2101
      username: chichengcn
      passward: chi671003
      mountpoint: BRUX0
      buffer_length: 32768
      loop_duration: 0.01
      formator_tags: [gnss-brux0]
  - streamer:
      tag: str-dlr0
      type: ntrip-client
      ip: 112.65.161.226
      port: 2101
      username: chichengcn
      passward: chi671003
      mountpoint: BCEP00DLR0
      buffer_length: 32768
      loop_duration: 0.01
      formator_tags: [gnss-dlr0]
  - streamer:
      tag: str-cas
      type: ntrip-client
      ip: 112.65.161.226
      port: 2101
      username: chichengcn
      passward: chi671003
      mountpoint: SSRA00CAS0
      buffer_length: 32768
      loop_duration: 0.01
      formator_tags: [gnss-cas]
  - streamer:
      tag: str-cnes
      type: ntrip-client
      ip: 112.65.161.226
      port: 2101
      username: chichengcn
      passward: chi671003
      mountpoint: SSRA00CNE0
      buffer_length: 32768
      loop_duration: 0.01
      formator_tags: [gnss-cnes]
  - streamer:
      tag: dcb_file
      type: file
      path: /home/cc/linux/softwares/gici/option/CAS0MGXRAP_20221580000_01D_01D_DCB.BSX
      enable_time_tag: false
      formator_tags: [dcb_file]
  - streamer:
      tag: str-log-brux0
      type: file
      path: /home/cc/datasets/ntrip/20220714/brux0.rtcm3
      enable_time_tag: true
      swap_interval: 0
      loop_duration: 0.01
      input_tag: str-brux0
  - streamer:
      tag: str-log-dlr0
      type: file
      path: /home/cc/datasets/ntrip/20220714/dlr0.rtcm3
      enable_time_tag: true
      swap_interval: 0
      loop_duration: 0.01
      input_tag: str-dlr0
  - streamer:
      tag: str-log-cas
      type: file
      path: /home/cc/datasets/ntrip/20220714/cas.rtcm3
      enable_time_tag: true
      swap_interval: 0
      loop_duration: 0.01
      input_tag: str-cas
  - streamer:
      tag: str-log-cnes
      type: file
      path: /home/cc/datasets/ntrip/20220714/cnes.rtcm3
      enable_time_tag: true
      swap_interval: 0
      loop_duration: 0.01
      input_tag: str-cnes
  - streamer:
      tag: solution_gnss
      type: file
      path: /home/cc/datasets/tmp/solution_gnss.txt
      enable_time_tag: false
      swap_interval: 0
      buffer_length: 4096
      loop_duration: 1e-3
      formator_tags: [solution_gnss]
  - streamer:
      tag: str-log-cnes-convert
      type: file
      path: /home/cc/datasets/ntrip/20220714/cnes_convert.rtcm3
      enable_time_tag: true
      swap_interval: 0
      loop_duration: 0.01
      formator_tags: [gnss-cnes-convert]

  formators:
  - formator:
      io: input
      tag: gnss-brux0
      type: gnss-rtcm-3
      role: [rover]
  - formator:
      io: input
      tag: gnss-dlr0
      type: gnss-rtcm-3
      role: [ephemeris]
  - formator:
      io: input
      tag: gnss-cas
      type: gnss-rtcm-3
      role: []
  - formator:
      io: input
      tag: gnss-cnes
      type: gnss-rtcm-3
      role: [ssr_ephemeris, code_bias, phase_bias]
  - formator:
      io: input
      tag: dcb_file
      type: dcb-file
      role: []
  - formator:
      io: output
      tag: solution_gnss
      type: nmea
      talker_id: GP
      use_gga: true
      use_rmc: true
      use_esa: false
  - formator:
      io: log
      tag: gnss-cnes-convert
      input_tag: gnss-cnes
      type: gnss-rtcm-3

  replay:
    enable: false
    speed: 1.0
    start_offset: 5.0

