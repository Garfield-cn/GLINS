# Gici board configurations
stream:
# A stream can link to multiple formators, but a formator can only link to one stream
# A stream can only link to one log formator.
# A stream can only link to one output formator.
  streamers:
  - streamer:
      tag: str-brux0
      type: ntrip-client
      ip: 112.65.161.226
      port: 2101
      username: chichengcn
      passward: chi671003
      mountpoint: BRUX0
      buffer_length: 32768
      loop_duration: 0.01
      formator_tags: [gnss-brux0]
  - streamer:
      tag: str-bkg0
      type: ntrip-client
      ip: 112.65.161.226
      port: 2101
      username: chichengcn
      passward: chi671003
      mountpoint: BCEP00BKG0
      buffer_length: 32768
      loop_duration: 0.01
      formator_tags: [gnss-bkg0]
  - streamer:
      tag: str-ssr
      type: ntrip-client
      ip: 112.65.161.226
      port: 2101
      username: chichengcn
      passward: chi671003
      mountpoint: SSRA00CAS0
      buffer_length: 32768
      loop_duration: 0.01
      formator_tags: [gnss-ssr]
  # - streamer:
  #     tag: str-2
  #     type: tcp-client
  #     ip: 192.168.1.103
  #     port: 9002
  #     loop_duration: 0.01
  #     formator_tags: [gnss-2]
  - streamer:
      tag: str-3
      type: tcp-server
      port: 9001
      loop_duration: 0.01
      input-tag: str-1
    #   formator_tags: [gnss-1-log-1]
  - streamer:
      tag: str-5
      type: tcp-server
      port: 9002
      loop_duration: 0.01
    #   input-tag: str-1
      formator_tags: [gnss-1-log-1]
  - streamer:
      tag: str-4
      type: file
      path: /home/cc/linux/softwares/gici/data/heading.rtcm3
      enable_time_tag: true
      swap_interval: 0
      loop_duration: 0.01
      input-tag: str-2
    #   formator_tags: [gnss-2-log-1]

  formators:
  - formator:
      io: input
      tag: gnss-brux0
      type: gnss-rtcm-3
      role: [rover]
  - formator:
      io: input
      tag: gnss-bkg0
      type: gnss-rtcm-3
      role: [ephemeris]
  - formator:
      io: input
      tag: gnss-ssr
      type: gnss-rtcm-3
      role: [correction]

  - formator:
      io: log
      tag: gnss-1-log-1
      input-tag: gnss-1
      type: gnss-rtcm-3
  - formator:
      io: log
      tag: gnss-2-log-1
      input-tag: gnss-2
      type: gnss-rtcm-3

  replay:
    enable: false
    speed: 1.0
    start_offset: 0.0